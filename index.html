document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"default\">\n<meta name=\"apple-mobile-web-app-title\" content=\"Wardrobe\">\n<meta name=\"theme-color\" content=\"#FAFAFA\">\n<script src=\"036c4d3f-8b7f-4b3e-bb26-4b636773b8cb\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:#FAFAFA;overscroll-behavior:none;}\n  x-dc{display:block;height:100%;width:100%;}\n  ::-webkit-scrollbar{display:none;width:0;height:0;}\n  input{-webkit-appearance:none;appearance:none;}\n  @keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}\n  @keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}\n  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n  <div style=\"height:100dvh;min-height:100%;width:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column;background:#FAFAFA;font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;color:#17171B;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden;\">\n\n    <!-- HEADER -->\n    <div style=\"flex:none;padding:calc(env(safe-area-inset-top, 0px) + 16px) 20px 6px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#FAFAFA;\">\n      <div style=\"min-width:0;\">\n        <div style=\"font-size:31px;font-weight:700;letter-spacing:-0.025em;line-height:1.04;\">{{ headerTitle }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ headerBtnShow }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ headerBtnClick }}\" style=\"flex:none;margin-top:-1px;padding:8px 17px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;background:{{ headerBtnBg }};color:{{ headerBtnColor }};border:0.5px solid {{ headerBtnBorder }};\">{{ headerBtnLabel }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- MAIN SCROLL -->\n    <div style=\"flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;\">\n\n      <!-- ============ CLOSET ============ -->\n      <sc-if value=\"{{ isCloset }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:0 0 24px;\">\n        <div style=\"position:sticky;top:0;z-index:22;background:#FAFAFA;\">\n        <div style=\"display:flex;gap:8px;overflow-x:auto;padding:8px 20px 8px;\">\n          <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ g.onClick }}\" style=\"flex:none;padding:7px 14px;border-radius:9999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:{{ g.bg }};color:{{ g.fg }};border:0.5px solid {{ g.border }};\">{{ g.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:2px 20px 12px;\">\n          <span style=\"font-size:13px;color:#A6A8AE;font-weight:500;\">{{ closetCount }}<\u002Fspan>\n          <div style=\"display:flex;align-items:center;gap:2px;background:#fff;border-radius:9999px;padding:3px;box-shadow:0 1px 2px rgba(0,0,0,0.05);\">\n            <div onclick=\"{{ setGridView }}\" style=\"width:32px;height:26px;border-radius:9999px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ gridBtnBg }};\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"3\" width=\"7.5\" height=\"7.5\" rx=\"1.8\" fill=\"{{ gridBtnColor }}\"><\u002Frect><rect x=\"13.5\" y=\"3\" width=\"7.5\" height=\"7.5\" rx=\"1.8\" fill=\"{{ gridBtnColor }}\"><\u002Frect><rect x=\"3\" y=\"13.5\" width=\"7.5\" height=\"7.5\" rx=\"1.8\" fill=\"{{ gridBtnColor }}\"><\u002Frect><rect x=\"13.5\" y=\"13.5\" width=\"7.5\" height=\"7.5\" rx=\"1.8\" fill=\"{{ gridBtnColor }}\"><\u002Frect><\u002Fsvg>\n            <\u002Fdiv>\n            <div onclick=\"{{ setListView }}\" style=\"width:32px;height:26px;border-radius:9999px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ listBtnBg }};\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"4.5\" width=\"18\" height=\"3\" rx=\"1.5\" fill=\"{{ listBtnColor }}\"><\u002Frect><rect x=\"3\" y=\"10.5\" width=\"18\" height=\"3\" rx=\"1.5\" fill=\"{{ listBtnColor }}\"><\u002Frect><rect x=\"3\" y=\"16.5\" width=\"18\" height=\"3\" rx=\"1.5\" fill=\"{{ listBtnColor }}\"><\u002Frect><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div onclick=\"{{ openFilter }}\" style=\"display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;color:{{ filterBtnColor }};background:{{ filterBtnBg }};padding:6px 13px;border-radius:9999px;box-shadow:0 1px 2px rgba(0,0,0,0.05);border:0.5px solid #E8E8EC;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\"><path d=\"M3 5h18M6 12h12M10 19h4\" stroke=\"{{ filterBtnIcon }}\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <span>Filter<\u002Fspan>\n            <sc-if value=\"{{ filterBadge }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"min-width:17px;height:17px;border-radius:9999px;background:#fff;color:#17171B;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;\">{{ filterBadge }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:9px;padding:2px 20px 14px;\">\n            <div onclick=\"{{ onAddItem }}\" style=\"flex:1;height:43px;border-radius:12px;background:#17171B;color:#fff;display:flex;align-items:center;justify-content:center;gap:5px;font-size:13.5px;font-weight:600;cursor:pointer;\">+ Add item<\u002Fdiv>\n            <div onclick=\"{{ onAddSlot }}\" style=\"flex:1;height:43px;border-radius:12px;background:#fff;border:0.5px solid #E2E2E6;color:#17171B;display:flex;align-items:center;justify-content:center;gap:5px;font-size:13.5px;font-weight:600;cursor:pointer;\">+ Add outfit slot<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:0 20px 16px;\">\n            <div style=\"background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.04);\">\n              <sc-for list=\"{{ slotRows }}\" as=\"s\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:9px;padding:10px 12px 10px 16px;border-bottom:0.5px solid {{ s.sep }};\">\n                  <div onclick=\"{{ s.onEdit }}\" style=\"flex:1;min-width:0;cursor:pointer;\">\n                    <div style=\"font-size:14px;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:center;gap:7px;\">{{ s.label }}<span style=\"font-size:8.5px;font-weight:700;letter-spacing:0.04em;padding:2px 7px;border-radius:6px;background:{{ s.tagBg }};color:{{ s.tagColor }};\">{{ s.tag }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#A6A8AE;margin-top:2px;\">{{ s.sub }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div onclick=\"{{ s.onUp }}\" style=\"width:30px;height:30px;border-radius:8px;background:{{ s.upBg }};display:flex;align-items:center;justify-content:center;font-size:11px;color:{{ s.upColor }};cursor:pointer;\">▲<\u002Fdiv>\n                  <div onclick=\"{{ s.onDown }}\" style=\"width:30px;height:30px;border-radius:8px;background:{{ s.downBg }};display:flex;align-items:center;justify-content:center;font-size:11px;color:{{ s.downColor }};cursor:pointer;\">▼<\u002Fdiv>\n                  <div onclick=\"{{ s.onEdit }}\" style=\"width:30px;height:30px;border-radius:8px;background:#F1F1F4;display:flex;align-items:center;justify-content:center;font-size:13px;color:#5B5D63;cursor:pointer;\">✎<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isGridView }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;\">\n          <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div onclick=\"{{ c.onOpen }}\" style=\"background:#fff;border-radius:16px;padding:8px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.03);position:relative;min-width:0;\">\n              <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;top:14px;left:14px;z-index:2;width:24px;height:24px;border-radius:9999px;background:rgba(23,23,27,0.82);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;\">✎<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"position:relative;aspect-ratio:1/1;border-radius:11px;background:#EEEEF1;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:9px;\">\n                <sc-if value=\"{{ c.hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n                  {{ c.photoNode }}\n                <\u002Fsc-if>\n                <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:9.5px;letter-spacing:0.1em;color:#B9BBC1;\">{{ c.colorTag }}<\u002Fspan>\n                <div style=\"position:absolute;top:8px;right:8px;display:flex;\">\n                  <sc-for list=\"{{ c.colorDots }}\" as=\"cd\" hint-placeholder-count=\"1\"><span style=\"width:15px;height:15px;border-radius:9999px;background:{{ cd.hex }};borde
